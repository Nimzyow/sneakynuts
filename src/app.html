<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		%sveltekit.head%
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
		<style>
			* {
				box-sizing: border-box; /* Apply border-box to all elements */
			}

			body {
				background-color: #000;
				color: #0f0;
				font-family: 'Press Start 2P', cursive;
				margin: 0;
				padding: 0;
				overflow-x: hidden; /* Prevent horizontal scrolling on the body */
			}

			/* ::-webkit-scrollbar {
				width: 10px;
			} */

			::-webkit-scrollbar-track {
				background: #000;
			}

			::-webkit-scrollbar-thumb {
				background: #0f0;
				border: 1px solid #000;
			}

			::-webkit-scrollbar-thumb:hover {
				background: #0a0; /* Darker green for hover */
			}

			/* Global root view transition styles REMOVED to prevent unintended animations on static elements like the sidebar. 
			   Specific transitions are handled in +layout.svelte for the main-content-slot. */
		</style>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<script>
			import { inject } from '@vercel/analytics';
			inject();
		</script>
	</body>
</html>
